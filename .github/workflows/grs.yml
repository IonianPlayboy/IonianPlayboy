name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&theme=onedark&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.PAT  }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&count_private=true&layout=compact&theme=onedark&hide=php,c,hack,makefile
          path: profile/top-langs.svg
          token: ${{ secrets.PAT  }}

    #   - name: Generate trophy
    #     uses: Erik-Donath/github-profile-trophy@feature/generate-svg
    #     with:
    #       username: ${{ github.repository_owner }}
    #       file: profile/trophy.svg
    #       token: ${{ secrets.PAT  }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
